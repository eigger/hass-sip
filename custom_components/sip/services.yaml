dial:
  name: Dial
  description: Initiate a SIP call.
  target:
    entity:
      integration: sip
      domain: media_player
  fields:
    number:
      name: Number
      description: SIP target number/URI to dial (e.g. 100 or sip:100@freepbx).
      required: true
      example: "100"
      selector:
        text:
    menu:
      name: IVR Menu
      description: Optional menu configuration for the call.
      required: false
      selector:
        object:
    ring_timeout:
      name: Ring Timeout
      description: Timeout in seconds for the call to ring before canceling.
      required: false
      selector:
        number:
          min: 1
          max: 300
          step: 1
          unit_of_measurement: seconds
    message:
      name: Message
      description: Optional text message to speak via TTS upon call connection. Supports Jinja templates.
      required: false
      selector:
        text:
          multiline: true
    tts_engine:
      name: TTS Engine
      description: Optional TTS engine to use for speaking the message.
      required: false
      selector:
        entity:
          domain: tts
    language:
      name: Language
      description: Optional language code for TTS (e.g. ko).
      required: false
      selector:
        text:
    tts_options:
      name: TTS Options
      description: Optional extra voice or speech settings (e.g. voice name).
      required: false
      selector:
        object:

hangup:
  name: Hang up
  description: End the active SIP call.
  target:
    entity:
      integration: sip
      domain: media_player
  fields:
    sip_code:
      name: SIP Status Code
      description: Optional status code to send if hanging up a ringing call.
      required: false
      example: 486
      selector:
        number:
          min: 100
          max: 699
          step: 1

answer:
  name: Answer
  description: Answer an incoming SIP call.
  target:
    entity:
      integration: sip
      domain: media_player
  fields:
    menu:
      name: IVR Menu
      description: Optional menu configuration to start on answer.
      required: false
      selector:
        object:
    message:
      name: Message
      description: Optional text message to speak via TTS upon answering. Supports Jinja templates.
      required: false
      selector:
        text:
          multiline: true
    tts_engine:
      name: TTS Engine
      description: Optional TTS engine to use for speaking the message.
      required: false
      selector:
        entity:
          domain: tts
    language:
      name: Language
      description: Optional language code for TTS (e.g. ko).
      required: false
      selector:
        text:
    tts_options:
      name: TTS Options
      description: Optional extra voice or speech settings (e.g. voice name).
      required: false
      selector:
        object:

send_dtmf:
  name: Send DTMF
  description: Send DTMF digits to the active SIP call.
  target:
    entity:
      integration: sip
      domain: media_player
  fields:
    digits:
      name: Digits
      description: DTMF digits to send (e.g. 123#).
      required: true
      example: "123#"
      selector:
        text:

start_recording:
  name: Start Recording
  description: Start recording call audio to a local WAV file.
  target:
    entity:
      integration: sip
      domain: media_player
  fields:
    recording_file:
      name: Recording File Path
      description: Absolute path of the WAV file to save (e.g. /media/recording.wav). Supports Jinja templates.
      required: true
      example: "/media/recording.wav"
      selector:
        text:

stop_recording:
  name: Stop Recording
  description: Stop active call recording.
  target:
    entity:
      integration: sip
      domain: media_player

start_assist:
  name: Start Assist
  description: Connect the active call to Home Assistant's Voice Assist.
  target:
    entity:
      integration: sip
      domain: media_player
